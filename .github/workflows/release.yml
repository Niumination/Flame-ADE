name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  PNPM_VERSION: 11

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: macos-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps (Tauri)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm tauri build --target ${{ matrix.target }}
        name: Build Tauri app

      - name: Install minisign (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install minisign

      - name: Install minisign (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y minisign

      - name: Sign artifacts
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          find src-tauri/target/release/bundle -type f | while read f; do
            echo "Signing: $f"
            printf '%s' "$MINISIGN_SECRET_KEY" | minisign -Sm "$f" -P SKIP
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flame-ade-${{ matrix.suffix }}
          path: src-tauri/target/release/bundle/**/*

  create-release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        run: |
          awk '/^### /{if (found) exit} /^## \[/{found=1} found{print}' CHANGELOG.md > release-notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Flame ADE ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            artifacts/**/*
          draft: true
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
